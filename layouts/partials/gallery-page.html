<div class="app is-gallery">

{{ partial "header.html" (dict "page" . "ctx" "gallery") }}

<div class="content">
  <div class="gallery-flow" id="galleryFlow">
    <div class="gc-info-cell">
      <span class="gc-info-title">{{ .Title }}</span>
      {{- with .Description }}<p class="gc-info-desc">{{ . }}</p>{{- end }}
    </div>
  </div>
</div>

{{ partial "data-panel.html" . }}
{{ partial "fab.html" . }}

{{ partialCached "page-data.html" . "global" }}
</div>
