<div class="app app-gallery">

<div class="gallery-grid" id="galleryGrid">
  <div class="gallery-hd">
    <div class="gallery-hd-top">
      <a class="hdr-home" href="{{ .Site.Home.RelPermalink }}" aria-label="Home">
        {{- with resources.Get "img/hiran-head.svg" -}}<span class="hdr-logo-mark">{{ .Content | safeHTML }}</span>{{- end -}}
      </a>
      <div class="hdr-actions">
        <button class="hdr-btn" id="fabExploreBtn" onclick="fabToggleExplore()" aria-label="Explore">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9L7 11.5L12 9"/><path d="M2 6.5L7 9L12 6.5"/><path d="M7 2.5L12 5L7 7.5L2 5L7 2.5Z"/></svg>
        </button>
        <button class="hdr-btn" id="fabThemeBtn" onclick="fabToggleTheme()" aria-label="Toggle theme">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="7" cy="7" r="2.5"/><line x1="7" y1="1" x2="7" y2="2.5"/><line x1="7" y1="11.5" x2="7" y2="13"/><line x1="1" y1="7" x2="2.5" y2="7"/><line x1="11.5" y1="7" x2="13" y2="7"/><line x1="3.05" y1="3.05" x2="4.1" y2="4.1"/><line x1="9.9" y1="9.9" x2="10.95" y2="10.95"/><line x1="9.9" y1="4.1" x2="10.95" y2="3.05"/><line x1="3.05" y1="10.95" x2="4.1" y2="9.9"/></svg>
        </button>
      </div>
    </div>
    <div class="gallery-hd-spacer"></div>
    <div class="gallery-hd-info">
      <h1 class="gallery-hd-title">{{ .Title }}</h1>
      {{- with .Description }}<p class="gallery-hd-desc">{{ . }}</p>{{- end }}
    </div>
  </div>
  <!-- .gc cards injected by JS -->
</div>
<div class="l-view" id="lView" style="display:none"></div>

{{ partial "data-panel.html" . }}
{{ partial "fab.html" . }}

{{ partialCached "page-data.html" . "global" }}
</div>
