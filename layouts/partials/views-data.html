<script>
{{- $views := slice (dict "id" "all" "label" "Everything") -}}
{{- range hugo.Data.types -}}
  {{- if and .in_everything (ne .show_filter false) -}}
    {{- $views = $views | append (dict "id" .id "label" .label) -}}
  {{- end -}}
{{- end -}}
const TYPES_CFG = {{ hugo.Data.types | jsonify | safeJS }};
const VIEWS_CFG = {{ $views | jsonify | safeJS }};
</script>
