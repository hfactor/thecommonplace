{{- $ctx := cond (not .Params.listingType) "everything" "section" -}}

<div class="app">

{{ partial "header.html" (dict
  "page"       .
  "ctx"        $ctx
  "activeType" (.Params.listingType | default "")
) }}

<div class="latest-chip" id="latestChip" onclick="goLatest()">↑ Latest</div>

<main class="content">
  <div class="m-wrap" id="mWrap"><div class="m-track" id="mTrack"></div></div>
  <div class="d-cols" id="dCols"></div>
  <div class="l-view" id="lView"></div>
</main>

{{ partial "data-panel.html" . }}

{{ partialCached "page-data.html" . (.Params.listingType | default "global") }}
</div>
