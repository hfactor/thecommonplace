<div class="app">
{{ partial "header.html" . }}

<div class="latest-chip" id="latestChip" onclick="goLatest()">↑ Latest</div>

<main class="content">
  <div class="m-wrap" id="mWrap"><div class="m-track" id="mTrack"></div></div>
  <div class="d-cols" id="dCols"></div>
  <div class="l-view" id="lView"></div>
</main>

{{ partial "sheet.html" . }}

<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="side-panel" id="sidePanel">
  <div class="sp-hdr">
    <button class="sp-back" onclick="closePanel()">←</button>
  </div>
  <div class="sp-body" id="spBody"></div>
</div>

{{ partialCached "page-data.html" . "global" }}
{{ partialCached "views-data.html" . "global" }}
</div>
