{{ define "main" }}
<div class="app" data-page="notes">

{{ partial "header.html" (dict "page" . "ctx" "notes") }}

  <div class="notes-scroll-area">
    <div class="notes-reading">
      <div class="page-title-row">
        <h1 class="note-title">{{ .Title }}</h1>
      </div>
      {{ with .Content }}
      <div class="note-content sp-text">{{ . }}</div>
      {{ end }}
    </div>
  </div>
</div>
{{ partial "notes-data.html" . }}
{{ end }}
